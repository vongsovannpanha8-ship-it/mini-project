<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caffeine Coffee</title>
    <link rel="stylesheet" href="../src/output.css">
    <!-- Cnd link for fontawesom -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>

<body class="bg-primary text-secondary">

    <!-- Background -->
    <head class="min-h-screen bg-[linear-gradient(90deg,rgba(255,255,255,0.08)_1px,transparent_1px)] bg-size-[55px_100%]">

        <!-- Navbar -->
        <nav class="mx-12 mt-4 border border-white/30 h-12 flex items-center justify-between px-5 text-sm">

            <div class="font-semibold">
                Caffeine
            </div>

            <div class="hidden md:flex gap-10 text-secondary">
                <a href="#" class="hover:text-white">Home</a>
                <a href="#" class="hover:text-white">Menu</a>
                <a href="#" class="hover:text-white">About Us</a>
            </div>

            <div class="flex items-center gap-4 text-secondary">
                <span class="hidden md:block">
                    Light Mode
                </span>

                <span class="border-l border-white/30 pl-3">
                    🔍
                </span>
            </div>

        </nav>

        <!-- Hero Section -->
        <section class="grid md:grid-cols-2 px-12 mt-12 items-center">

          <!-- content  -->
            <div class="space-y-6">

                <h1 class="text-5xl font-bold leading-tight">
                    Discover The<br>
                    Art of Perfect<br>
                    Coffee
                </h1>


                <p class="text-gray-300 text-sm max-w-md">
                    Experience The Rich And Bold Flavors Of Our 
                    Exquisite Coffee Blends, Crafted To Awaken Your
                    Senses And Start Your Day Right
                </p>

                <!-- Buttons -->
                <div class="flex gap-5">

                    <button class=" border border-secondary bg-secondary text-primary px-6 py-3 rounded-sm text-sm hover:bg-primary hover:text-secondary">
                        Order Now →
                    </button>


                    <button class="border border-white px-6 py-3 rounded-sm text-sm hover:bg-secondary hover:text-primary">
                        Explore More
                    </button>

                </div>



                <!-- oeder in this shop -->
                <div class="flex gap-10 pt-3">

                    <div>
                        <h3 class="text-lg">
                            50+
                        </h3>
                        <p class="text-xs text-secondary">
                            ITEM OF COFFEE
                        </p>
                    </div>


                    <div>
                        <h3 class="text-lg">
                            20+
                        </h3>
                        <p class="text-xs text-secondary">
                            Order Running
                        </p>
                    </div>


                    <div>
                        <h3 class="text-lg">
                            2K+
                        </h3>
                        <p class="text-xs text-secondary">
                            Happy Customer
                        </p>
                    </div>

                </div>

            </div>

            <!-- Image of t his page -->
            <div class="flex justify-center">

                <img 
                src="../Images/Coffee.png"
                alt="coffee"
                class="w-130 object-contain drop-shadow-2xl"
                >

            </div>
        </section>
    </head>


</body>
</html>
